# MediaMTX Configuration
logLevel: info
logDestinations: [stdout]

# API for programmatic control
api: yes
apiAddress: 127.0.0.1:9997

# ── RTSP Server (used by Python worker for local re-streaming) ─
rtsp: yes
rtspAddress: :8554

# ── HLS Settings ───────────────────────────────────────────────
hls: yes
hlsAddress: :8888
hlsAlwaysRemux: no             # Only transcode when browser is watching (saves CPU)
hlsAllowOrigins: ["*"]
hlsVariant: mpegts             # Lighter than fmp4, lower CPU per stream
hlsTrustedProxies: []
hlsEncryption: no
hlsSegmentDuration: 1s         # 1s gives MediaMTX enough time per segment for multi-stream
hlsSegmentCount: 6             # More segments = more buffer room during CPU spikes

# RTSP paths — always pull from camera (Python reads RTSP directly)
paths:
  all_others:
    source: publisher
